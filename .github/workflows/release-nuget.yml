name: Release to Nuget
on:
  workflow_dispatch:
    # No input required
  release:
    types: [published]

jobs:
  build:
    uses: ./.github/workflows/build.yml
  deploy_release:
    name: Publish nuget package
    needs: [build]
    runs-on: [windows-2025]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 100
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: 'package.json'
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@11.16.0
      - run: npm ci
      - run: npm run build
        env:
          release: true
      - run: echo "version=$(node -e "console.log(require('./version').getReleaseVersion());")" >> $env:GITHUB_ENV
        shell: pwsh
      - run: echo $env:version
        shell: pwsh
      - run: npm run nuget -- $env:version
        shell: pwsh

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Push the package
      - name: NuGet push
        run: dotnet nuget push "build/nuget/Excalibur.${{ env.version }}.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
        shell: pwsh
